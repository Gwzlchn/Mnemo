# 前端单测 + 覆盖率(容器化,宿主机不装 node 依赖)。
# 跑:  docker compose -f docker-compose.fe-test.yml run --rm fe-test
# node:20-alpine 与 frontend/Dockerfile 同基;npmmirror 直连(出站代理已放行)。
# 不设 name:,compose 用目录名作 project → 天然按 worktree 隔离,不撞别的栈。
services:
  fe-test:
    image: node:20-alpine
    working_dir: /app
    environment:
      - npm_config_registry=https://registry.npmmirror.com
    volumes:
      - ./frontend:/app
      - fe_node_modules:/app/node_modules   # node_modules 放卷里,不污染工作区、re-run 更快
    command: sh -c "npm install --no-audit --no-fund && npx vitest run --coverage"

volumes:
  fe_node_modules:
