# 资源池配置:仅声明每池并发上限(limit)与 worker 在线判定窗口。
# 池的拓扑关系是代码权威,不在此配置:
#   · scene↔cpu 互斥(scene 运行时冻结 cpu 池) → shared/runner_ops.py 认领/释放处;
#   · worker 类型→订阅池映射          → worker/main.py 的 WORKER_POOLS;
#   · 哪些池可出网                     → worker/step_runner.py 的 _NETWORKED_POOLS。
pools:
  io:
    limit: 999
  scene:
    limit: 1
  cpu:
    limit: 3
  ai:
    limit: 2
  gpu:
    limit: 1
    # gpu 池仅由 --type gpu 且具 whisper 能力的 worker 服务;无此 worker 时
    # 含 gpu 步(audio 的 00b_whisper)的 job 会被 scheduler fail-fast 而非永久挂起。

# Worker 在线判定窗口（后端权威，全栈共用一套阈值）。
worker_status:
  heartbeat_interval_sec: 10   # worker 端心跳节拍
  online_window_sec: 30        # 3x 心跳，容忍丢两拍仍判在线
  stale_window_sec: 900        # 15min 仍无心跳判 stale，供 GC 回收僵尸
