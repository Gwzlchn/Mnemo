# GitLab-CI 风格流水线：变量/模板(extends)/needs/rules 在加载时归一化为内部 step 结构。
# 顺序由 needs 决定；prod↔integration 的差异退化为 integration 文件里一份 variables 覆盖。

# 全局默认：所有 job 自动继承、可逐字段覆盖。
default:
  image: mnemo/step-base
  timeout: 600
  retry: 0

# 隐藏模板（'.' 前缀，不直接运行）：同类步只写差异，extends 按键深合并。
.cpu-step:
  pool: cpu
  timeout: 120
  retry: 1

.ai-step:
  pool: ai
  timeout: 600
  retry: 2

.review:
  pool: ai
  timeout: 120
  retry: 2

video:
  variables:
    # OCR 单一事实源：CPU 逐帧扫描需大超时；超时是工作量过大而非瞬时抖动，故少重试。
    OCR_TIMEOUT: 1800
    OCR_RETRIES: 1
    AI_SMART_PRIMARY_PROVIDER: anthropic
    AI_SMART_PRIMARY_MODEL: claude-sonnet-4-6
    AI_SMART_FALLBACK_PROVIDER: openai
    AI_SMART_FALLBACK_MODEL: gpt-4o
    AI_SMART_TEXT_PROVIDER: deepseek
    AI_SMART_TEXT_MODEL: deepseek-v4-pro
    AI_REVIEW_PRIMARY_PROVIDER: anthropic
    AI_REVIEW_PRIMARY_MODEL: claude-haiku-4-5
    AI_REVIEW_FALLBACK_PROVIDER: deepseek
    AI_REVIEW_FALLBACK_MODEL: deepseek-v4-flash
    AI_PUNCT_PRIMARY_PROVIDER: deepseek
    AI_PUNCT_PRIMARY_MODEL: deepseek-v4-flash
    AI_PUNCT_FALLBACK_PROVIDER: local
    AI_PUNCT_FALLBACK_MODEL: "qwen3:7b"
  jobs:
    "00_download":
      run: steps.common.step_00_download
      pool: io
      retry: 3

    "00b_whisper":
      run: steps.video.step_00b_whisper
      image: mnemo/step-gpu
      pool: gpu
      needs: ["00_download"]
      timeout: 1800
      retry: 2
      tags: ["gpu"]
      rules:
        - exists: "input/*.srt"
          when: skip

    "01_scene":
      run: steps.video.step_01_scene
      image: mnemo/step-heavy
      pool: scene
      needs: ["00_download"]
      retry: 2

    "02_frames":
      extends: .cpu-step
      run: steps.video.step_02_frames
      image: mnemo/step-heavy
      needs: ["01_scene"]

    "03_dedup":
      extends: .cpu-step
      run: steps.video.step_03_dedup
      image: mnemo/step-heavy
      needs: ["02_frames"]

    "04_ocr":
      extends: .cpu-step
      run: steps.video.step_04_ocr
      image: mnemo/step-heavy
      needs: ["03_dedup"]
      timeout: $OCR_TIMEOUT
      retry: $OCR_RETRIES

    "05_danmaku":
      run: steps.video.step_05_danmaku
      pool: io
      needs: ["00_download"]
      timeout: 30
      retry: 1
      rules:
        - exists: "input/*.ass"
          when: on

    "06_punctuate":
      extends: .ai-step
      run: steps.video.step_06_punctuate
      needs: ["00_download"]
      timeout: 300
      retry: 3
      tags: []
      rules:
        - exists: "input/*.srt"
          when: on
      ai:
        primary: {provider: $AI_PUNCT_PRIMARY_PROVIDER, model: $AI_PUNCT_PRIMARY_MODEL}
        fallback: {provider: $AI_PUNCT_FALLBACK_PROVIDER, model: $AI_PUNCT_FALLBACK_MODEL}

    "07_mechanical":
      run: steps.video.step_07_mechanical
      pool: io
      needs: ["04_ocr", "05_danmaku", "06_punctuate"]
      timeout: 30
      retry: 1

    "08_smart":
      extends: .ai-step
      run: steps.video.step_08_smart
      needs: ["07_mechanical"]
      tags: ["vision"]
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
        text_fallback: {provider: $AI_SMART_TEXT_PROVIDER, model: $AI_SMART_TEXT_MODEL}

    "09_review":
      extends: .review
      run: steps.video.step_09_review
      needs: ["08_smart"]
      tags: []
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}

paper:
  variables:
    AI_SMART_PRIMARY_PROVIDER: anthropic
    AI_SMART_PRIMARY_MODEL: claude-sonnet-4-6
    AI_SMART_FALLBACK_PROVIDER: deepseek
    AI_SMART_FALLBACK_MODEL: deepseek-v4-pro
    AI_REVIEW_PRIMARY_PROVIDER: anthropic
    AI_REVIEW_PRIMARY_MODEL: claude-haiku-4-5
    AI_REVIEW_FALLBACK_PROVIDER: deepseek
    AI_REVIEW_FALLBACK_MODEL: deepseek-v4-flash
  jobs:
    "00_download":
      run: steps.common.step_00_download
      pool: io
      timeout: 300
      retry: 3

    "10_pdf_parse":
      extends: .cpu-step
      run: steps.paper.step_10_pdf_parse
      image: mnemo/step-heavy
      needs: ["00_download"]

    "11_sections":
      extends: .cpu-step
      run: steps.paper.step_11_sections
      needs: ["10_pdf_parse"]
      timeout: 60

    "12_figures":
      extends: .cpu-step
      run: steps.paper.step_12_figures
      image: mnemo/step-heavy
      needs: ["10_pdf_parse"]

    "14_smart_paper":
      extends: .ai-step
      run: steps.paper.step_14_smart_paper
      needs: ["11_sections", "12_figures"]
      tags: []
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}

    "15_review":
      extends: .review
      run: steps.paper.step_15_review
      needs: ["14_smart_paper"]
      tags: []
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}
