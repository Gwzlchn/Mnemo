      run: steps.common.step_00_download
      pool: io
      timeout: 120
      retry: 3

    "16_parse_article":
      extends: .cpu-step
      run: steps.article.step_16_parse_article
      needs: ["00_download"]
      timeout: 60

    "17_article_sections":
      extends: .cpu-step
      run: steps.article.step_17_article_sections
      needs: ["16_parse_article"]
      timeout: 60

    "18_smart_article":
      extends: .ai-step
      run: steps.article.step_18_smart_article
      needs: ["17_article_sections"]
      tags: []
