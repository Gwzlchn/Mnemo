# GitLab-CI 风格流水线：变量/模板(extends)/needs/rules 在加载时归一化为内部 step 结构。
# 顺序由 needs 决定；prod↔integration 的差异退化为 integration 文件里一份 variables 覆盖。
#
# 约定:
#   - 步骤键按执行顺序从 01 递增(每条 pipeline 各自从 01 开始)。
#   - label:  步骤中文显示名(前端各处展示)。英文键只在日志/技术视图出现。
#   - outputs: 本步产物的文件 glob(单一事实源)。前端「分步产物」按此分组展示;
#              未被任何步骤匹配的文件归入「其他」。job.json 等敏感文件由代码强制隐藏。

# 全局默认：所有 job 自动继承、可逐字段覆盖。
default:
  image: flori/step-base
  timeout: 600
  retry: 0

# 隐藏模板（'.' 前缀，不直接运行）：同类步只写差异，extends 按键深合并。
.cpu-step:
  pool: cpu
  timeout: 120
  retry: 1

.ai-step:
  pool: ai
  timeout: 600
  # 5 次：让限流(ai_rate_limit)长退避策略 [300,600,1200,1800,1800] 跑满，耐心等配额恢复；
  # 普通 ai 错误仍按其策略上限(3)退避，互不影响(调度取 min(policy_max, retry))。
  retry: 5

.review:
  pool: ai
  timeout: 120
  retry: 5

video:
  variables:
    OCR_TIMEOUT: 1800
    OCR_RETRIES: 1
    AI_SMART_PRIMARY_PROVIDER: claude-cli
    AI_SMART_PRIMARY_MODEL: subscription
    AI_SMART_FALLBACK_PROVIDER: claude-cli
    AI_SMART_FALLBACK_MODEL: subscription
    AI_SMART_TEXT_PROVIDER: claude-cli
    AI_SMART_TEXT_MODEL: subscription
    AI_REVIEW_PRIMARY_PROVIDER: claude-cli
    AI_REVIEW_PRIMARY_MODEL: subscription
    AI_REVIEW_FALLBACK_PROVIDER: claude-cli
    AI_REVIEW_FALLBACK_MODEL: subscription
    AI_PUNCT_PRIMARY_PROVIDER: claude-cli
    AI_PUNCT_PRIMARY_MODEL: subscription
    AI_PUNCT_FALLBACK_PROVIDER: claude-cli
    AI_PUNCT_FALLBACK_MODEL: subscription
  jobs:
    "01_download":
      label: "下载"
      run: steps.common.step_01_download
      pool: io
      retry: 3
      timeout: 2400   # 长视频(30min+)1080p 下载 + 推 MinIO 可能超默认 600s
      outputs: ["input/source.mp4", "input/source.mp3", "input/source.m4a",
                "input/metadata.json", "input/*.srt", "input/*.ass",
                "input/source.pdf", "input/source.html"]

    "02_whisper":
      label: "语音转写"
      run: steps.video.step_02_whisper
      image: flori/step-gpu
      pool: cpu
      needs: ["01_download"]
      timeout: 1800
      retry: 2
      tags: []
      rules:
        - exists: "input/*.srt"
          when: skip
      outputs: ["input/subtitle.srt"]

    "03_scene":
      label: "场景检测"
      run: steps.video.step_03_scene
      image: flori/step-heavy
      pool: scene
      needs: ["01_download"]
      retry: 2
      outputs: ["intermediate/scenes.json"]

    "04_frames":
      label: "关键帧"
      extends: .cpu-step
      run: steps.video.step_04_frames
      image: flori/step-heavy
      needs: ["03_scene"]
      timeout: 1800   # cv2 逐场景 SSIM 代表帧:长视频(数百场景)耗时,远超 .cpu-step 的 120s
      outputs: ["intermediate/candidates.json", "assets/*"]

    "05_dedup":
      label: "画面去重"
      extends: .cpu-step
      run: steps.video.step_05_dedup
      image: flori/step-heavy
      needs: ["04_frames"]
      timeout: 900    # 数百帧 pHash + 灰区 SSIM 复核
      outputs: ["intermediate/dedup.json"]

    "06_ocr":
      label: "画面文字(OCR)"
      extends: .cpu-step
      run: steps.video.step_06_ocr
      image: flori/step-heavy
      needs: ["05_dedup"]
      timeout: $OCR_TIMEOUT
      retry: $OCR_RETRIES
      outputs: ["intermediate/ocr.json"]

    "07_danmaku":
      label: "弹幕"
      run: steps.video.step_07_danmaku
      pool: io
      needs: ["01_download"]
      timeout: 30
      retry: 1
      rules:
        - exists: "input/*.ass"
          when: on
      outputs: ["intermediate/danmaku.json"]

    "08_punctuate":
      label: "口播稿"
      extends: .ai-step
      run: steps.video.step_08_punctuate
      # 依赖 02_whisper:无原生字幕时等 whisper 转写出 input/subtitle.srt 再出口播稿
      # (whisper 有原生 srt 则 skip,视为满足依赖)。否则规则在 whisper 前求值→无 srt→08 被跳过→
      # 笔记只剩 OCR。规则保留作兜底(whisper 万一没产 srt 则优雅跳过)。
      needs: ["01_download", "02_whisper"]
      timeout: 1800
      retry: 5
      tags: []
      rules:
        - exists: "input/*.srt"
          when: on
      ai:
        primary: {provider: $AI_PUNCT_PRIMARY_PROVIDER, model: $AI_PUNCT_PRIMARY_MODEL}
        fallback: {provider: $AI_PUNCT_FALLBACK_PROVIDER, model: $AI_PUNCT_FALLBACK_MODEL}
      outputs: ["output/transcript.md"]

    "09_mechanical":
      label: "机械版笔记"
      run: steps.video.step_09_mechanical
      pool: io
      # 依赖 08:口播稿(标点版,源自原生字幕或 whisper 转写)必须先就绪再出机械版,否则无字幕视频
      # (如 YouTube 无 CC)只会得到纯 OCR 笔记、丢失口播主体内容。08 有 retry:5 容错。
      needs: ["06_ocr", "07_danmaku", "08_punctuate"]
      timeout: 30
      retry: 1
      outputs: ["output/notes_mechanical.md"]

    "10_smart":
      label: "智能版笔记"
      extends: .ai-step
      run: steps.video.step_10_smart
      needs: ["09_mechanical"]
      tags: ["vision"]
      timeout: 1800   # claude-cli 逐张 Read 帧图(最多 20+ 张),与 provider 超时上限对齐
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
        text_fallback: {provider: $AI_SMART_TEXT_PROVIDER, model: $AI_SMART_TEXT_MODEL}
      outputs: ["output/versions/notes_smart_*"]

    "11_review":
      label: "评审"
      extends: .review
      run: steps.video.step_11_review
      needs: ["10_smart"]
      tags: []
      timeout: 1800   # claude-cli 对大 prompt(笔记+机械稿)生成评审较慢,给足时间
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}
      outputs: ["output/versions/review_*"]   # 版本化评审(与笔记版本 1:1 配对);笔记页另渲染可读面板

    "12_evidence":
      label: "权威来源"
      extends: .ai-step
      run: steps.video.step_evidence
      # 案例取证(ADR-0012):仅案例类(domain=finance / style_tags 含 case-study)触发,步内自门控,
      # 其余写空 skip。依赖机械稿(OCR 锚点来源);为旁路 leaf——smart 暂不消费 evidence,不阻塞主链。
      needs: ["09_mechanical"]
      tags: []
      timeout: 1800   # claude WebSearch + 直连 curl 多轮 agentic 取证
      retry: 1        # 外网/反爬易抖,不像评审那样 5 次硬刚
      ai:
        primary: {provider: claude-cli, model: subscription}
        fallback: {provider: claude-cli, model: subscription}
      outputs: ["output/evidence.json", "output/evidence/*"]

paper:
  variables:
    AI_SMART_PRIMARY_PROVIDER: anthropic
    AI_SMART_PRIMARY_MODEL: claude-sonnet-4-6
    AI_SMART_FALLBACK_PROVIDER: deepseek
    AI_SMART_FALLBACK_MODEL: deepseek-v4-pro
    AI_REVIEW_PRIMARY_PROVIDER: anthropic
    AI_REVIEW_PRIMARY_MODEL: claude-haiku-4-5
    AI_REVIEW_FALLBACK_PROVIDER: deepseek
    AI_REVIEW_FALLBACK_MODEL: deepseek-v4-flash
  jobs:
    "01_download":
      label: "下载"
      run: steps.common.step_01_download
      pool: io
      timeout: 300
      retry: 3
      outputs: ["input/source.pdf", "input/metadata.json"]

    "02_pdf_parse":
      label: "PDF 解析"
      extends: .cpu-step
      run: steps.paper.step_02_pdf_parse
      image: flori/step-heavy
      needs: ["01_download"]
      outputs: ["intermediate/parsed.json"]

    "03_sections":
      label: "章节切分"
      extends: .cpu-step
      run: steps.paper.step_03_sections
      needs: ["02_pdf_parse"]
      timeout: 60
      outputs: ["intermediate/sections.json"]

    "04_figures":
      label: "图表提取"
      extends: .cpu-step
      run: steps.paper.step_04_figures
      image: flori/step-heavy
      needs: ["02_pdf_parse"]
      outputs: ["intermediate/figures.json", "assets/*"]

    "05_smart_paper":
      label: "智能版笔记"
      extends: .ai-step
      run: steps.paper.step_05_smart_paper
      needs: ["03_sections", "04_figures"]
      tags: []
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
      outputs: ["output/versions/notes_smart_*"]

    "06_review":
      label: "评审"
      extends: .review
      run: steps.paper.step_06_review
      needs: ["05_smart_paper"]
      tags: []
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}
      outputs: ["output/versions/review_*"]   # 版本化评审(与笔记版本 1:1 配对);笔记页另渲染可读面板

article:
  variables:
    AI_SMART_PRIMARY_PROVIDER: anthropic
    AI_SMART_PRIMARY_MODEL: claude-sonnet-4-6
    AI_SMART_FALLBACK_PROVIDER: deepseek
    AI_SMART_FALLBACK_MODEL: deepseek-v4-pro
    AI_REVIEW_PRIMARY_PROVIDER: anthropic
    AI_REVIEW_PRIMARY_MODEL: claude-haiku-4-5
    AI_REVIEW_FALLBACK_PROVIDER: deepseek
    AI_REVIEW_FALLBACK_MODEL: deepseek-v4-flash
  jobs:
    "01_download":
      label: "下载"
      run: steps.common.step_01_download
      pool: io
      timeout: 120
      retry: 3
      outputs: ["input/source.html", "input/metadata.json", "input/article_meta.json"]

    "02_parse_article":
      label: "正文解析"
      extends: .cpu-step
      run: steps.article.step_02_parse_article
      needs: ["01_download"]
      timeout: 60
      outputs: ["intermediate/parsed.json"]

    "03_article_sections":
      label: "章节切分"
      extends: .cpu-step
      run: steps.article.step_03_article_sections
      needs: ["02_parse_article"]
      timeout: 60
      outputs: ["intermediate/sections.json"]

    "04_smart_article":
      label: "智能版笔记"
      extends: .ai-step
      run: steps.article.step_04_smart_article
      needs: ["03_article_sections"]
      tags: []
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
      outputs: ["output/versions/notes_smart_*"]

    "05_review":
      label: "评审"
      extends: .review
      run: steps.article.step_05_review
      needs: ["04_smart_article"]
      tags: []
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}
      outputs: ["output/versions/review_*"]   # 版本化评审(与笔记版本 1:1 配对);笔记页另渲染可读面板

audio:
  variables:
    AI_SMART_PRIMARY_PROVIDER: anthropic
    AI_SMART_PRIMARY_MODEL: claude-sonnet-4-6
    AI_SMART_FALLBACK_PROVIDER: deepseek
    AI_SMART_FALLBACK_MODEL: deepseek-v4-pro
    AI_REVIEW_PRIMARY_PROVIDER: anthropic
    AI_REVIEW_PRIMARY_MODEL: claude-haiku-4-5
    AI_REVIEW_FALLBACK_PROVIDER: deepseek
    AI_REVIEW_FALLBACK_MODEL: deepseek-v4-flash
  jobs:
    "01_download":
      label: "下载"
      run: steps.common.step_01_download
      pool: io
      timeout: 120
      retry: 3
      outputs: ["input/source.mp3", "input/source.m4a", "input/source.mp4", "input/metadata.json"]

    # 转写复用 video 的 whisper 步;落在 whisper-capable worker(gpu 池含 cpu fallback)。
    "02_whisper":
      label: "语音转写"
      run: steps.video.step_02_whisper
      image: flori/step-gpu
      pool: gpu
      needs: ["01_download"]
      timeout: 1800
      retry: 2
      tags: ["gpu"]
      outputs: ["input/subtitle.srt"]

    "03_transcript_parse":
      label: "转写解析"
      extends: .cpu-step
      run: steps.audio.step_03_transcript_parse
      needs: ["02_whisper"]
      timeout: 60
      outputs: ["intermediate/transcript.json", "output/transcript.md", "intermediate/segments.json"]

    "04_smart_podcast":
      label: "智能版笔记"
      extends: .ai-step
      run: steps.audio.step_04_smart_podcast
      needs: ["03_transcript_parse"]
      tags: []
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
      outputs: ["output/versions/notes_smart_*"]

    "05_review":
      label: "评审"
      extends: .review
      run: steps.audio.step_05_review
      needs: ["04_smart_podcast"]
      tags: []
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}
      outputs: ["output/versions/review_*"]   # 版本化评审(与笔记版本 1:1 配对);笔记页另渲染可读面板
