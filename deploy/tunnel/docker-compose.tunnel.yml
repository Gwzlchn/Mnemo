# NAS → ECS 反向 SSH 隧道(容器化)
# 把 ECS 的 127.0.0.1:8000(仅本机回环,不公开)反代到 NAS 后端 api:8000。
# 容器加入后端 docker 网络,用 docker DNS 解析 api(option b)。
# ECS sshd GatewayPorts=no => 所有 -R 转发强制绑回环,天然不公开。
services:
  autossh:
    image: jnovack/autossh:latest
    container_name: flori-tunnel
    restart: unless-stopped
    networks:
      - backend
    environment:
      SSH_REMOTE_USER: root
      SSH_REMOTE_HOST: ${EDGE_HOST}
      SSH_REMOTE_PORT: "22"
      # 远端口 8000 -> 隧道另一端 api:8000(docker DNS)
      SSH_TUNNEL_PORT: "8000"
      SSH_TARGET_HOST: api
      SSH_TARGET_PORT: "8000"
      SSH_MODE: "-R"
      SSH_SERVER_ALIVE_INTERVAL: "30"
      SSH_SERVER_ALIVE_COUNT_MAX: "3"
    volumes:
      - ./ssh/id_ed25519:/id_rsa:ro
      - ./ssh/known_hosts:/known_hosts:ro

  # NAS -> ECS 正向隧道(-L):把 ECS 的 127.0.0.1:7007(dozzle agent,仅回环)
  # 映射到本容器 0.0.0.0:7007,供后端网络里的 NAS Dozzle(collector)连接。
  # 不在 ECS 开任何公网口;agent 始终只绑 ECS 回环。
  dozzle-agent-ecs:
    image: jnovack/autossh:latest
    container_name: flori-tunnel-dozzle
    restart: unless-stopped
    networks:
      - backend
    environment:
      SSH_REMOTE_USER: root
      SSH_REMOTE_HOST: ${EDGE_HOST}
      SSH_REMOTE_PORT: "22"
      SSH_MODE: "-L"
      SSH_BIND_IP: "0.0.0.0"
      SSH_TUNNEL_PORT: "7007"
      SSH_TARGET_HOST: "127.0.0.1"
      SSH_TARGET_PORT: "7007"
      SSH_SERVER_ALIVE_INTERVAL: "30"
      SSH_SERVER_ALIVE_COUNT_MAX: "3"
    volumes:
      - ./ssh/id_ed25519:/id_rsa:ro
      - ./ssh/known_hosts:/known_hosts:ro

  # NAS -> ECS 反向(-R):把 NAS 的 redis:6379 暴露到 ECS 127.0.0.1:6379,供 ECS worker 连中心队列。
  redis-tunnel:
    image: jnovack/autossh:latest
    container_name: flori-tunnel-redis
    restart: unless-stopped
    networks:
      - backend
    environment:
      SSH_REMOTE_USER: root
      SSH_REMOTE_HOST: ${EDGE_HOST}
      SSH_REMOTE_PORT: "22"
      SSH_TUNNEL_PORT: "6379"
      SSH_TARGET_HOST: redis
      SSH_TARGET_PORT: "6379"
      SSH_MODE: "-R"
      SSH_SERVER_ALIVE_INTERVAL: "30"
      SSH_SERVER_ALIVE_COUNT_MAX: "3"
    volumes:
      - ./ssh/id_ed25519:/id_rsa:ro
      - ./ssh/known_hosts:/known_hosts:ro

  # NAS -> ECS 反向(-R):把 NAS 的 minio:9000 暴露到 ECS 127.0.0.1:9000,供 ECS worker 拉/推产物。
  minio-tunnel:
    image: jnovack/autossh:latest
    container_name: flori-tunnel-minio
    restart: unless-stopped
    networks:
      - backend
    environment:
      SSH_REMOTE_USER: root
      SSH_REMOTE_HOST: ${EDGE_HOST}
      SSH_REMOTE_PORT: "22"
      SSH_TUNNEL_PORT: "9000"
      SSH_TARGET_HOST: minio
      SSH_TARGET_PORT: "9000"
      SSH_MODE: "-R"
      SSH_SERVER_ALIVE_INTERVAL: "30"
      SSH_SERVER_ALIVE_COUNT_MAX: "3"
    volumes:
      - ./ssh/id_ed25519:/id_rsa:ro
      - ./ssh/known_hosts:/known_hosts:ro

networks:
  backend:
    external: true
    name: flori_default
