# Flori 边缘(ECS):Caddy(自签 TLS + Basic Auth + 反代)+ 前端容器 + Watchtower。
# 无状态:前端是 ghcr 镜像,Watchtower 跟随 CI 自动更新;不再手工 scp dist。
services:
  caddy:
    image: caddy:2-alpine
    container_name: flori-caddy
    # host 网络:绑 443 且能访问宿主 127.0.0.1:8000(隧道口)/127.0.0.1:8080(前端容器)
    network_mode: host
    restart: unless-stopped
    depends_on:
      - frontend
    volumes:
      - /opt/flori-edge/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  # 应用前端:只对本机回环暴露 8090,由 Caddy 反代。
  # watchtower.enable=true:前端 = ghcr 公开镜像,Watchtower 跟随 CI 自动更新(nginx base 层已缓存,
  # 每次只增量拉变化的 app 层,拉取快)。单一路径 git push→CI 建 ghcr→Watchtower 自动 pull+重建,无手动直传。
  frontend:
    image: ghcr.io/${IMAGE_OWNER:-gwzlchn}/flori-frontend:latest
    container_name: flori-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # CD:每 120s 查 ghcr,只更新带 watchtower.enable=true 标签的容器(此处即前端),自动 pull+重建+清旧镜像。
  # 用 ghcr 镜像:此 ECS 不通 Docker Hub(registry-1.docker.io 超时),ghcr 可达。
  watchtower:
    image: ghcr.io/containrrr/watchtower
    container_name: flori-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --interval 10

volumes:
  caddy-data:
  caddy-config:
