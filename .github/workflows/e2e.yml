name: E2E (manual)

# 集成回归门:手动触发(workflow_dispatch),不挂在每个 PR 上(避免给主 CI 加负载)。
#
# 覆盖目标(审计缺口 #7):真实 pipeline DAG ↔ worker ↔ scheduler ↔ step 的接线回归,
# 主 CI 只跑单测,缺这道集成接线验证。
#
# 本 workflow 含两个互不依赖、可并行的 job:
#
#   1) integration-smoke —— 接线健康探针(轻量、永远能跑):
#        a) 用 docker-compose.integration.yml 起整套栈(DRY_RUN=1,AI 步返回合成产物);
#        b) 探活 API(/openapi.json),确认 api ↔ redis 连通;
#        c) 确认 scheduler / worker-cpu / worker-ai 容器拉起且不在崩溃重启;
#        d) 跑容器内单测套件(与主 CI 同路径)兜底回归。
#
#   2) paper-e2e —— 真实素材端到端(审计缺口 #7 的实质覆盖):
#        投一个自带的微型 PDF(tests/fixtures/sample.pdf,~2KB,无需网络/arXiv/B站/API key),
#        把 paper 这条最轻的真实链路从 upload 跑到 done,真正回归
#        DAG↔scheduler↔worker↔step 接线 + 真实 PDF 解析(02/03/04 真跑;05/06 经 DRY_RUN 合成)。
#        逻辑全在 tests/integration/ci_paper_e2e.sh,见该 job 的注释。
#
# 仍属**人工/自托管**覆盖(本 workflow 不跑):真实视频/B站/arXiv 联网下载 + 真实 AI 笔记全链路——
#   01_download 对 URL 源会真连 B站/arXiv、真实 AI 步需真 API key,GitHub-hosted runner 跑不动;
#   见 tests/integration/run_e2e_cpu.sh / run_e2e_ai.sh 与 docs/12-cicd.md。

on:
  workflow_dispatch:
    inputs:
      keep_stack:
        description: "失败时保留栈以便排查(true/false)"
        required: false
        default: "false"

jobs:
  integration-smoke:
    runs-on: ubuntu-latest
    env:
      USE_USTC_MIRROR: "0"     # 海外 runner 用官方源
      DRY_RUN: "1"             # AI 步骤走 DryRunProvider,无需任何 API key
      COMPOSE: "docker compose -f docker-compose.integration.yml"
    steps:
      - uses: actions/checkout@v6

      - name: Build integration stack
        run: $COMPOSE build

      - name: Bring up stack (DRY_RUN)
        run: $COMPOSE up -d redis api scheduler worker-cpu worker-ai

      - name: Probe API health (/openapi.json)
        run: |
          # api 无专用 health 端点;/openapi.json 始终可匿名访问,作为 api↔redis 就绪信号。
          for i in $(seq 1 30); do
            if curl -fsS --noproxy '*' http://localhost:8000/openapi.json >/dev/null 2>&1; then
              echo "API 就绪 (第 ${i} 次探测)"
              exit 0
            fi
            sleep 3
          done
          echo "::error::API 在 90s 内未就绪"
          $COMPOSE logs api scheduler
          exit 1

      - name: Verify worker/scheduler wiring (容器存活,非崩溃重启)
        run: |
          sleep 5  # 给 worker 一点时间注册到 redis
          fail=0
          for svc in scheduler worker-cpu worker-ai; do
            cid="$($COMPOSE ps -q "$svc")"
            if [ -z "$cid" ]; then
              echo "::error::服务 $svc 未创建容器"; fail=1; continue
            fi
            state="$(docker inspect -f '{{.State.Status}}' "$cid")"
            restarts="$(docker inspect -f '{{.RestartCount}}' "$cid")"
            echo "$svc: status=$state restarts=$restarts"
            if [ "$state" != "running" ]; then
              echo "::error::$svc 未在运行 (status=$state)"; fail=1
            fi
            if [ "${restarts:-0}" -gt 2 ]; then
              echo "::error::$svc 反复重启 (restarts=$restarts),疑似接线/导入错误"; fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            $COMPOSE logs scheduler worker-cpu worker-ai
            exit 1
          fi

      - name: Unit suite (容器内,集成镜像复用)
        run: |
          # 在容器内跑全量单测,与主 CI 的 test job 同路径,作回归兜底。
          # 注(H-10):test.yml 与上面 integration build 共用同一 docker/base.Dockerfile,
          # 故此处 build 命中 buildx/层缓存(非真正二次全量构建);保留独立 build 是因 test 栈
          # 用不同 image tag / 挂载。如需进一步省时,可改为复用集成镜像 tag。
          docker compose -f docker-compose.test.yml build
          docker compose -f docker-compose.test.yml run --rm test

      # 真实素材覆盖(人工/自托管):
      #   在装好素材的机器上对**已部署/在跑**的栈手动执行——
      #     TEST_VIDEO_FILE=/path/to.mp4 bash tests/integration/run_e2e_cpu.sh   # 下载+CPU 链
      #     KIMI_API_KEY=... TEST_VIDEO_FILE=/path/to.mp4 \
      #       bash tests/integration/run_e2e_ai.sh                               # 全链路+真实 AI 笔记
      #   GitHub-hosted runner 不跑这两个(需真实视频/PDF/网络/API key)。

      - name: Tear down
        if: always() && github.event.inputs.keep_stack != 'true'
        run: |
          $COMPOSE down -v || true
          docker compose -f docker-compose.test.yml down -v || true

  # ───────────────────────────────────────────────────────────────────────
  # paper-e2e:真实素材 · paper pipeline 端到端回归(审计缺口 #7 的实质覆盖)。
  #
  # 与上面的 integration-smoke 不同:这里不止"探活",而是投一个**自带的微型 PDF**
  # (tests/fixtures/sample.pdf,~2KB,无需任何网络/arXiv/B站/API key),把 paper 这条
  # 最轻的真实链路从 upload 一路跑到 done,真正回归 DAG↔scheduler↔worker↔step 接线 + 真实解析。
  #
  #   真跑(REAL):
  #     01_download   upload 模式(文件已落 input/source.pdf,本步只抽 metadata,不联网下载)
  #     02_pdf_parse  PyMuPDF/fitz 真解析文本/标题/章节/图注
  #     03_sections   扁平章节 → 树(断言 total_sections>0)
  #     04_figures    PyMuPDF 抽图 + 文中 "Figure 1:" 图注成条
  #   合成(SYNTHETIC,DRY_RUN=1 → DryRunProvider,无需 key):
  #     05_smart_paper · 06_review
  #
  # 仍属人工/自托管覆盖(本 job 不跑):真实视频 / B站·arXiv 联网下载 / 真实 AI 笔记链路
  #   —— 见 tests/integration/run_e2e_cpu.sh、run_e2e_ai.sh 与 docs/12-cicd.md。
  paper-e2e:
    runs-on: ubuntu-latest
    # 与 integration-smoke 互不依赖,可并行;失败只影响本 job,不连坐探针。
    env:
      USE_USTC_MIRROR: "0"   # 海外 runner 用官方源
      DRY_RUN: "1"           # AI 步走 DryRunProvider,无需任何 API key
    steps:
      - uses: actions/checkout@v6

      - name: Run paper pipeline E2E (real fixture, dry-run AI)
        # 脚本自起集成栈、上传 fixture、轮询至 done、断言 notes/smart + review + sections,
        # 并在退出时(成功或失败)自动 down -v 拆栈。失败即非零退出,CI 据此 gate。
        run: bash tests/integration/ci_paper_e2e.sh

      - name: Dump stack logs on failure
        if: failure()
        run: |
          docker compose -p flori-ci-paper -f docker-compose.integration.yml \
            logs --tail 200 api scheduler worker-cpu worker-ai || true

      - name: Tear down (safety net)
        # 脚本自带 trap 拆栈;此步是兜底(若脚本在 trap 前被强杀)。KEEP_STACK 未设即正常拆。
        if: always()
        run: |
          docker compose -p flori-ci-paper -f docker-compose.integration.yml \
            down -v --remove-orphans || true
