name: Step Images

# 按步执行镜像独立于主 CI,仅手动触发(docker 执行器为 opt-in,镜像按需构建,不污染每次 push)。
on:
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # 推镜像到 ghcr.io 用内置 GITHUB_TOKEN
    strategy:
      matrix:
        include:
          - image: flori-step-base
            dockerfile: docker/step-base.Dockerfile
          - image: flori-step-heavy
            dockerfile: docker/step-heavy.Dockerfile
          - image: flori-step-gpu
            dockerfile: docker/step-gpu.Dockerfile
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            USE_USTC_MIRROR=0
          cache-from: type=gha
          cache-to: type=gha,mode=max
