name: CI

# push/PR 跑测试；合并到 main 后构建并推送镜像到 ghcr.io。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 后端单测 + 分支覆盖率门(75%)。容器内跑(与本地 docker compose test 同路径),pytest-xdist `-n auto` 多进程并行。
  # 原单 `test` job(6m32s)= unit+cov(4m10s)+ schemathesis(2m16s,串行);此处拆成 unit ‖ fuzz 两条并行 job,
  # 关键路径降到 ~max(unit, fuzz)。测试镜像(精简 test stage,无 ffmpeg/nodejs/claude)用 registry buildcache
  # (flori-test:buildcache)→ 跨 run 不冷建依赖层(pip 全命中,只重算变动代码层;依赖层在源码 COPY 之前=分层铁律)。
  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # cache-to 写 ghcr flori-test:buildcache 需 packages:write(首跑创建该包)
    outputs:
      cov: ${{ steps.cov.outputs.pct }}
    env:
      USE_USTC_MIRROR: "0"     # 海外 runner 用官方源
    steps:
      - uses: actions/checkout@v6
      # ghcr 缓存引用必须全小写;owner 含大写 → 统一算一个小写 owner 供 cache 引用(见 build-push 同款注释)。
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      # 抹 pyproject version→占位(0.0.0)稳定 COPY pyproject 缓存层(version 每提交变,否则下游 pip 全废冷建);
      # 真实版本读出经 FLORI_VERSION build-arg 注入镜像 ENV(shared/version.py 用它覆盖,显示仍准)。
      - name: 稳定 pip 缓存(取真实版本 + 抹 pyproject version 为占位)
        run: |
          echo "FLORI_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)" >> "$GITHUB_ENV"
          sed -i 's/^version = .*/version = "0.0.0"/' pyproject.toml
      - uses: docker/setup-buildx-action@v4
      - name: Log in to ghcr.io
        if: github.ref == 'refs/heads/main'   # 仅 main 需登录(写 buildcache);PR 只读缓存(私有包读不到则优雅回退 gha)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # test stage(精简测试镜像)走 registry buildcache:cache-to 仅 main(unit 独占写,避免与 fuzz 并行双写冲突);
      # PR 回退 gha。load=true 把 flori-test:latest 装进本地 docker,供下方 docker compose run 直接用(不再 build)。
      - name: Build test image(test stage, registry buildcache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/base.Dockerfile
          target: test
          tags: flori-test:latest
          load: true
          build-args: |
            USE_USTC_MIRROR=0
            FLORI_VERSION=${{ env.FLORI_VERSION }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/flori-test:buildcache
            type=gha,scope=flori-test
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=ghcr.io/{0}/flori-test:buildcache,mode=max', env.OWNER_LC) || 'type=gha,scope=flori-test,mode=max' }}
      - name: Unit tests + 分支覆盖率门(--cov-fail-under=75,见 docker-compose.test.yml)
        id: cov
        run: |
          docker compose -f docker-compose.test.yml run --rm test | tee /tmp/be-cov.log
          pct=$(grep -oP 'Total coverage: \K[0-9.]+' /tmp/be-cov.log | tail -1 || true)
          pct=${pct:-unknown}
          echo "pct=$pct" >> "$GITHUB_OUTPUT"
          echo "### 🐍 后端分支覆盖率:${pct}%" >> "$GITHUB_STEP_SUMMARY"

  # 注:OpenAPI 模糊/契约(schemathesis)已从每次 push 拆出 → 独立每日 cron(.github/workflows/fuzz.yml),
  #     不再拖慢 push CI 关键路径(它本来 2m16s 串行)。手动可 workflow_dispatch。

  # 前端单测 + 覆盖率(容器化 vitest;node:20-alpine)。与后端 test job 并行,各自为门。
  fe-test:
    runs-on: ubuntu-latest
    outputs:
      cov: ${{ steps.cov.outputs.pct }}
    steps:
      - uses: actions/checkout@v6
      - name: Frontend unit tests + 覆盖率(vitest)
        id: cov
        run: |
          # 海外 runner 用官方 npm 源覆盖 compose 里默认的 npmmirror(国内直连)
          docker compose -f docker-compose.fe-test.yml run --rm \
            -e npm_config_registry=https://registry.npmjs.org fe-test | tee /tmp/fe-cov.log
          pct=$(grep -oP 'Statements\s*:\s*\K[0-9.]+' /tmp/fe-cov.log | tail -1 || true)
          pct=${pct:-unknown}
          echo "pct=$pct" >> "$GITHUB_OUTPUT"
          echo "### 🟢 前端语句覆盖率:${pct}%" >> "$GITHUB_STEP_SUMMARY"

  # 仅 main：把前后端覆盖率写成 shields endpoint JSON,force-push 到 badges 数据分支(README 徽章读它)。
  # badges 分支不触发 CI(on 只认 main/PR),零额外 secret(用内置 GITHUB_TOKEN;public 仓库 shields 直接读 raw)。
  coverage-badge:
    needs: [unit, fe-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 生成覆盖率徽章 JSON 并 force-push badges 分支
        env:
          BE: ${{ needs.unit.outputs.cov }}
          FE: ${{ needs.fe-test.outputs.cov }}
        run: |
          col() { awk -v p="$1" 'BEGIN{n=p+0; print (n>=80)?"brightgreen":(n>=60)?"yellow":"orange"}'; }
          mkdir badges && cd badges
          printf '{"schemaVersion":1,"label":"backend cov","message":"%s%%","color":"%s"}\n' "$BE" "$(col "$BE")" > coverage-backend.json
          printf '{"schemaVersion":1,"label":"frontend cov","message":"%s%%","color":"%s"}\n' "$FE" "$(col "$FE")" > coverage-frontend.json
          git init -q -b badges
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage-backend.json coverage-frontend.json
          git commit -q -m "chore(badges): 覆盖率 be=${BE}% fe=${FE}% [skip ci]"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" badges

  # 仅 main：测试通过后构建镜像（amd64；所有目标机均为 x86）并推送。
  build-push:
    # PR 也构建镜像(只是不推),把 Dockerfile/构建期问题(如前端 vue-tsc)挡在合并前;推送仅 main。
    needs: [unit, fe-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # 推镜像到 ghcr.io 用内置 GITHUB_TOKEN
    strategy:
      matrix:
        # P2 image-split:后端拆 3 个 target(scheduler/api/worker)各出一镜像,共用 base.Dockerfile;前端单独。
        include:
          - image: flori-scheduler
            dockerfile: docker/base.Dockerfile
            context: .
            target: scheduler
          - image: flori-api
            dockerfile: docker/base.Dockerfile
            context: .
            target: api
          - image: flori-worker
            dockerfile: docker/base.Dockerfile
            context: .
            target: worker
          - image: flori-frontend  # nginx + 构建好的 Vue 静态资源(无 target → 建末 stage)
            dockerfile: frontend/Dockerfile
            context: ./frontend
    steps:
      - uses: actions/checkout@v6
      # ghcr 镜像/缓存引用必须全小写,而 github.repository_owner 含大写字母:
      # metadata-action 会自动转小写 tag,但手写的 buildcache 引用不会 → 导致
      # "failed to configure registry cache exporter: ... must be lowercase",build-push 必挂。
      # 这里统一算一个小写 owner 供 images / cache 引用复用。
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      # 抹 pyproject version→占位稳定 pip 缓存层;真实版本经 FLORI_VERSION build-arg 注入(见 unit job 同款注释)。
      - name: 稳定 pip 缓存(取真实版本 + 抹 pyproject version 为占位)
        run: |
          echo "FLORI_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)" >> "$GITHUB_ENV"
          sed -i 's/^version = .*/version = "0.0.0"/' pyproject.toml
      # 注:不装 setup-qemu —— 全部 platforms: linux/amd64(原生,所有目标机 x86),无需 QEMU/binfmt 跨架构模拟。
      #     装了反而让 4 个并行 build job 抢同一 binfmt GHA 缓存 key,刷 "Unable to reserve cache" 警告。
      - uses: docker/setup-buildx-action@v4
      - name: Log in to ghcr.io
        if: github.ref == 'refs/heads/main'   # 仅 main 需登录(PR 只构建不推)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}   # 后端=scheduler/api/worker;前端空 → 建末 stage
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}   # PR 只构建验证,推送仅 main
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            USE_USTC_MIRROR=0
            FLORI_BUILD_SHA=${{ github.sha }}
            FLORI_VERSION=${{ env.FLORI_VERSION }}
          # registry 缓存常驻 ghcr(不被 GHA 10GB LRU 淘汰)→ 依赖层 digest 稳定,远程 worker 重拉
          # 只下变动的代码层(几 MB),不再整包重下 1GB+ 依赖。PR 无 ghcr 登录则回退 gha。
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/${{ matrix.image }}:buildcache
            type=gha
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=ghcr.io/{0}/{1}:buildcache,mode=max', env.OWNER_LC, matrix.image) || 'type=gha,mode=max' }}
