name: CI

# push/PR 跑测试；合并到 main 后构建并推送镜像到 ghcr.io。
# 纯文档提交(*.md / docs / ROADMAP / .local)不触发 CI —— 不跑测试、不重建镜像(paths-ignore)。
on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'ROADMAP.md', '.local/**']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'ROADMAP.md', '.local/**']

jobs:
  # 后端单测【拆 3 shard 并行】(pytest-split 静态均衡分片):关键路径 1m21s(全量) → ~max(shard)≈27s。
  # 每 shard 只跑 1/3 用例、产【部分覆盖率】.coverage.N 上传;合并判 75% 交给 coverage-gate(分片后各自判会漏)。
  # test stage 精简镜像(无 ffmpeg/nodejs/claude)走 registry buildcache(flori-test:buildcache),3 shard 并行共享缓存。
  unit:
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # 仅 group 1 cache-to 写 ghcr flori-test:buildcache 需 packages:write
    env:
      USE_USTC_MIRROR: "0"     # 海外 runner 用官方源
    steps:
      - uses: actions/checkout@v6
      # ghcr 缓存引用必须全小写;owner 含大写 → 统一算一个小写 owner 供 cache 引用。
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      # 抹 pyproject version→占位(0.0.0)稳定 COPY pyproject 缓存层(version 每提交变,否则下游 pip 全废冷建);
      # 真实版本读出经 FLORI_VERSION build-arg 注入镜像 ENV(shared/version.py 用它覆盖,显示仍准)。
      - name: 稳定 pip 缓存(取真实版本 + 抹 pyproject version 为占位)
        run: |
          echo "FLORI_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)" >> "$GITHUB_ENV"
          sed -i 's/^version = .*/version = "0.0.0"/' pyproject.toml
      - uses: docker/setup-buildx-action@v4
      - name: Log in to ghcr.io
        if: github.ref == 'refs/heads/main'   # 仅 main 需登录(写 buildcache);PR 只读缓存(读不到则优雅回退 gha)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # load=true 把 flori-test:latest 装进本地 docker,供下方 docker compose run 直接用(不再 build)。
      - name: Build test image(test stage, registry buildcache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/base.Dockerfile
          target: test
          tags: flori-test:latest
          load: true
          build-args: |
            USE_USTC_MIRROR=0
            FLORI_VERSION=${{ env.FLORI_VERSION }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/flori-test:buildcache
            type=gha,scope=flori-test
          # ★仅 group 1 写 buildcache(3 shard 并行,避免多写同一 ref 冲突/浪费);其余 shard 只读。PR 回退 gha。
          cache-to: ${{ github.ref == 'refs/heads/main' && matrix.group == 1 && format('type=registry,ref=ghcr.io/{0}/flori-test:buildcache,mode=max', env.OWNER_LC) || (github.ref != 'refs/heads/main' && matrix.group == 1 && 'type=gha,scope=flori-test,mode=max' || '') }}
      # shard N/3:pytest-split 静态分片 + -n auto 进程并行;--cov-report= 只写数据不出报告;
      # COVERAGE_FILE 指向挂载卷 /covdata/.coverage.N → 上传 artifact,coverage-gate 合并判门。
      - name: Unit tests (shard ${{ matrix.group }}/3, 部分覆盖率)
        run: |
          mkdir -p covdata
          docker compose -f docker-compose.test.yml run --rm \
            -v "$GITHUB_WORKSPACE/covdata:/covdata" \
            -e COVERAGE_FILE=/covdata/.coverage.${{ matrix.group }} \
            test \
            pytest -p no:cacheprovider -m 'not fuzz' -n auto \
              --splits 3 --group ${{ matrix.group }} \
              --cov=shared --cov=api --cov=scheduler --cov=worker --cov=steps \
              --cov-branch --cov-report=
      - name: Upload 部分覆盖率
        uses: actions/upload-artifact@v4
        with:
          name: cov-${{ matrix.group }}
          path: covdata/.coverage.${{ matrix.group }}
          include-hidden-files: true    # .coverage.N 是隐藏文件,v4 默认排除隐藏文件

  # 合并 3 shard 的部分覆盖率 → 判分支覆盖率门 75%(★分片后不能各自判,部分覆盖会误判)。
  # 在 test 容器内 combine+report:数据路径 /app/* 与容器内源码一致,不用 [paths] 重映射。
  coverage-gate:
    needs: [unit]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      cov: ${{ steps.cov.outputs.pct }}
    env:
      USE_USTC_MIRROR: "0"
    steps:
      - uses: actions/checkout@v6
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: 稳定 pip 缓存(抹 version 为占位)
        run: |
          echo "FLORI_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)" >> "$GITHUB_ENV"
          sed -i 's/^version = .*/version = "0.0.0"/' pyproject.toml
      - uses: docker/setup-buildx-action@v4
      # gate 不写 cache(group 1 已写),只读命中(shard 刚建的层全在缓存 → 秒级)。
      - name: Build test image(buildcache 命中复用)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/base.Dockerfile
          target: test
          tags: flori-test:latest
          load: true
          build-args: |
            USE_USTC_MIRROR=0
            FLORI_VERSION=${{ env.FLORI_VERSION }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/flori-test:buildcache
            type=gha,scope=flori-test
      - name: Download 各 shard 部分覆盖率
        uses: actions/download-artifact@v4
        with:
          pattern: cov-*
          path: covdata
          merge-multiple: true          # 三个 artifact 合到一个目录:covdata/.coverage.{1,2,3}
      - name: Combine 覆盖率 + 判分支覆盖率门(--fail-under=75)
        id: cov
        run: |
          docker compose -f docker-compose.test.yml run --rm \
            -v "$GITHUB_WORKSPACE/covdata:/covdata" test \
            sh -c 'cp /covdata/.coverage.* /app/ && cd /app && coverage combine && coverage report --fail-under=75' \
            | tee /tmp/cov.log
          pct=$(awk '/^TOTAL/{gsub("%","",$NF); print $NF}' /tmp/cov.log | tail -1)
          pct=${pct:-unknown}
          echo "pct=$pct" >> "$GITHUB_OUTPUT"
          echo "### 🐍 后端分支覆盖率(合并 3 shard):${pct}%" >> "$GITHUB_STEP_SUMMARY"

  # 注:OpenAPI 模糊/契约(schemathesis)已拆到独立每日 cron(.github/workflows/fuzz.yml),不拖慢 push CI。

  # 前端单测 + 覆盖率(容器化 vitest;node:20-alpine)。与后端并行,各自为门。
  fe-test:
    runs-on: ubuntu-latest
    outputs:
      cov: ${{ steps.cov.outputs.pct }}
    steps:
      - uses: actions/checkout@v6
      - name: Frontend unit tests + 覆盖率(vitest)
        id: cov
        run: |
          docker compose -f docker-compose.fe-test.yml run --rm \
            -e npm_config_registry=https://registry.npmjs.org fe-test | tee /tmp/fe-cov.log
          pct=$(grep -oP 'Statements\s*:\s*\K[0-9.]+' /tmp/fe-cov.log | tail -1 || true)
          pct=${pct:-unknown}
          echo "pct=$pct" >> "$GITHUB_OUTPUT"
          echo "### 🟢 前端语句覆盖率:${pct}%" >> "$GITHUB_STEP_SUMMARY"

  # 改动路径侦测:据此让 build-push 只重建【相关】镜像(前端-only 不重建后端,反之亦然)。
  detect:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.f.outputs.backend }}
      frontend: ${{ steps.f.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            backend:
              - 'shared/**'
              - 'steps/**'
              - 'api/**'
              - 'scheduler/**'
              - 'worker/**'
              - 'tunnel_stats/**'
              - 'configs/**'
              - 'docker/**'
              - 'pyproject.toml'
            frontend:
              - 'frontend/**'

  # 仅 main:把前后端覆盖率写成 shields endpoint JSON,force-push 到 badges 数据分支。
  coverage-badge:
    needs: [coverage-gate, fe-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 生成覆盖率徽章 JSON 并 force-push badges 分支
        env:
          BE: ${{ needs.coverage-gate.outputs.cov }}
          FE: ${{ needs.fe-test.outputs.cov }}
        run: |
          col() { awk -v p="$1" 'BEGIN{n=p+0; print (n>=80)?"brightgreen":(n>=60)?"yellow":"orange"}'; }
          mkdir badges && cd badges
          printf '{"schemaVersion":1,"label":"backend cov","message":"%s%%","color":"%s"}\n' "$BE" "$(col "$BE")" > coverage-backend.json
          printf '{"schemaVersion":1,"label":"frontend cov","message":"%s%%","color":"%s"}\n' "$FE" "$(col "$FE")" > coverage-frontend.json
          git init -q -b badges
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage-backend.json coverage-frontend.json
          git commit -q -m "chore(badges): 覆盖率 be=${BE}% fe=${FE}% [skip ci]"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" badges

  # 测试过才构建镜像(amd64)。PR 也构建(验 Dockerfile/前端 vue-tsc),推送仅 main。
  # 路径过滤:仅重建【本次改动相关】的镜像(前端-only 跳后端 3 镜像,后端-only 跳前端)。
  build-push:
    needs: [coverage-gate, fe-test, detect]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # 推镜像到 ghcr.io 用内置 GITHUB_TOKEN
    strategy:
      matrix:
        include:
          - image: flori-scheduler
            dockerfile: docker/base.Dockerfile
            context: .
            target: scheduler
          - image: flori-api
            dockerfile: docker/base.Dockerfile
            context: .
            target: api
          - image: flori-worker
            dockerfile: docker/base.Dockerfile
            context: .
            target: worker
          - image: flori-frontend  # nginx + 构建好的 Vue 静态资源(无 target → 建末 stage)
            dockerfile: frontend/Dockerfile
            context: ./frontend
    steps:
      - uses: actions/checkout@v6
      # 本 matrix 项是否需要构建:前端镜像看 frontend 改动,后端 3 镜像看 backend 改动。跳过则整个 job 空转极快。
      - name: 是否需要构建本镜像
        id: gate
        run: |
          if [ "${{ matrix.image }}" = "flori-frontend" ]; then
            want="${{ needs.detect.outputs.frontend }}"
          else
            want="${{ needs.detect.outputs.backend }}"
          fi
          echo "build=$want" >> "$GITHUB_OUTPUT"
          [ "$want" = "true" ] && echo "→ 构建 ${{ matrix.image }}" || echo "→ 跳过 ${{ matrix.image }}(无相关改动)"
      - name: Lowercase owner
        if: steps.gate.outputs.build == 'true'
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: 稳定 pip 缓存(取真实版本 + 抹 pyproject version 为占位)
        if: steps.gate.outputs.build == 'true'
        run: |
          echo "FLORI_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)" >> "$GITHUB_ENV"
          sed -i 's/^version = .*/version = "0.0.0"/' pyproject.toml
      - uses: docker/setup-buildx-action@v4
        if: steps.gate.outputs.build == 'true'
      - name: Log in to ghcr.io
        if: steps.gate.outputs.build == 'true' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags
        id: meta
        if: steps.gate.outputs.build == 'true'
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - name: Build and push
        if: steps.gate.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}   # 后端=scheduler/api/worker;前端空 → 建末 stage
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}   # PR 只构建验证,推送仅 main
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            USE_USTC_MIRROR=0
            FLORI_BUILD_SHA=${{ github.sha }}
            FLORI_VERSION=${{ env.FLORI_VERSION }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/${{ matrix.image }}:buildcache
            type=gha
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=ghcr.io/{0}/{1}:buildcache,mode=max', env.OWNER_LC, matrix.image) || 'type=gha,mode=max' }}
