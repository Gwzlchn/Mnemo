name: CI

# push/PR 跑测试；合并到 main 后构建并推送镜像到 ghcr.io。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 容器内跑全部单元测试 + 分支覆盖率门(与本地 docker compose test 同路径)。
  test:
    runs-on: ubuntu-latest
    env:
      USE_USTC_MIRROR: "0"     # 海外 runner 用官方源
    steps:
      - uses: actions/checkout@v6
      - name: Unit tests + 分支覆盖率门(--cov-fail-under=75,见 docker-compose.test.yml)
        run: |
          docker compose -f docker-compose.test.yml build
          docker compose -f docker-compose.test.yml run --rm test
      # OpenAPI 模糊/契约(schemathesis):对每个端点喂畸形输入,断言不 5xx 崩溃。
      # 复用上一步已 build 的镜像;fuzz 用例带 `fuzz` marker(默认套件已 -m 'not fuzz' 排除),此处单独 -m fuzz 跑。
      - name: Schemathesis 模糊/契约(无 5xx)
        run: |
          docker compose -f docker-compose.test.yml run --rm test \
            sh -c "pip install -q 'fakeredis[lua]>=2.28,<4' 'pytest>=8.0,<9' 'pytest-asyncio>=0.24,<1' 'schemathesis>=4,<5' && pytest -m fuzz tests/test_openapi_fuzz.py -p no:cacheprovider -q"

  # 前端单测 + 覆盖率(容器化 vitest;node:20-alpine)。与后端 test job 并行,各自为门。
  fe-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Frontend unit tests + 覆盖率(vitest)
        run: |
          # 海外 runner 用官方 npm 源覆盖 compose 里默认的 npmmirror(国内直连)
          docker compose -f docker-compose.fe-test.yml run --rm \
            -e npm_config_registry=https://registry.npmjs.org fe-test

  # 仅 main：测试通过后构建镜像（amd64；所有目标机均为 x86）并推送。
  build-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # 推镜像到 ghcr.io 用内置 GITHUB_TOKEN
    strategy:
      matrix:
        include:
          - image: mnemo           # api/scheduler/worker 共用
            dockerfile: docker/base.Dockerfile
            context: .
          - image: mnemo-frontend  # nginx + 构建好的 Vue 静态资源
            dockerfile: frontend/Dockerfile
            context: ./frontend
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            USE_USTC_MIRROR=0
          cache-from: type=gha
          cache-to: type=gha,mode=max
