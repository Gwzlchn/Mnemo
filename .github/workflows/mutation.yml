name: Mutation (manual)

# 变异测试:给核心模块注入小改动(< → <=、+1、True→False、删行…),逐个跑相关测试——
# 测试仍绿 = "存活变异" = 你的断言抓不住的真实 bug。变异分数(killed / 总数)直接量
# "测试到底有没有意义",比覆盖率更狠。打哪些模块见 scripts/mutation_score.py 的 TARGETS:
#   shared/ai_gateway.py(计费/exec_id 去重 → 重复计费风险)、shared/db.py、
#   scheduler/(状态迁移)、worker/(乐观锁)—— docs/09-testing.md 反复强调的并发/计费安全面。
#
# 慢(每个变异要跑相关测试)→ 仅手动触发(workflow_dispatch),不挂每个 PR。
# 报告态:存活变异不让本 job 变红(初期必有存活/等价变异),分数打日志供人工裁定。
#
# 为什么不用 `mutmut run` 自带的判生死:本仓库布局下 mutmut 3.6 的自动 runner 恒报 killed=0
# (它跑测试时 import shared 解析到 /app/shared 原文,没从 mutants/ 副本激活变异;mutmut 3.6 的
# run 只有 --max-children 一个选项,无 runner/cwd 配置可纠正)。底层 trampoline 机制是好的——
# 设 MUTANT_UNDER_TEST={module}.{mutant} 后从 mutants/ 跑 pytest 能真正路由到变异体。
# scripts/mutation_score.py 就把这条手动 recipe 做成循环,产出**真实**的 killed/survived。
on:
  workflow_dispatch:
    inputs:
      target:
        description: "只跑 key 含该子串的目标(如 ai_gateway / db / scheduler / worker);留空=全部核心模块"
        required: false
        default: ""

jobs:
  mutmut:
    runs-on: ubuntu-latest
    env:
      USE_USTC_MIRROR: "0"     # 海外 runner 用官方源
    steps:
      - uses: actions/checkout@v6

      - name: Build test image
        run: docker compose -f docker-compose.test.yml build

      - name: Mutation score(真实 killed/survived,见 scripts/mutation_score.py)
        env:
          TARGET: ${{ github.event.inputs.target }}
        run: |
          docker compose -f docker-compose.test.yml run --rm -e TARGET="$TARGET" test sh -c '
            pip install -q "fakeredis[lua]>=2.28,<4" "pytest>=8.0,<9" "pytest-asyncio>=0.24,<1" \
              "mutmut>=3,<4" "openai>=1.50,<3" "anthropic>=0.40,<1" || exit 1
            python3 scripts/mutation_score.py "$TARGET"
          '
