name: Fuzz

# OpenAPI 模糊/契约(schemathesis):对每个端点喂畸形输入,断言不 5xx 崩溃。
# 从 push CI 拆出(它本来串行 ~2m16s、拖慢每次 push 的关键路径)→ 每日定时跑一次 + 可手动触发。
# 复用 ci.yml unit job 写的 ghcr flori-test:buildcache(仅读)→ 测试镜像秒级建出。
on:
  schedule:
    - cron: "0 18 * * *"   # 每日 UTC 18:00 = 北京 02:00(错开 mutation 的 03:00)
  workflow_dispatch: {}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read        # 读 flori-test:buildcache(unit job 写)
    env:
      USE_USTC_MIRROR: "0"
    steps:
      - uses: actions/checkout@v6
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      # 抹 pyproject version→占位稳定 pip 缓存层(同 ci.yml unit);真实版本经 FLORI_VERSION build-arg 注入。
      - name: 稳定 pip 缓存(取真实版本 + 抹 pyproject version 为占位)
        run: |
          echo "FLORI_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)" >> "$GITHUB_ENV"
          sed -i 's/^version = .*/version = "0.0.0"/' pyproject.toml
      - uses: docker/setup-buildx-action@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # 复用 buildcache(仅 cache-from):依赖层全命中,只重算变动代码层。load 给下方 compose run 用。
      - name: Build test image(test stage, registry buildcache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/base.Dockerfile
          target: test
          tags: flori-test:latest
          load: true
          build-args: |
            USE_USTC_MIRROR=0
            FLORI_VERSION=${{ env.FLORI_VERSION }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/flori-test:buildcache
      # schemathesis 已烤进 test stage([test] extra),直接 pytest -m fuzz(不再运行时 pip install)。
      - name: Schemathesis 模糊/契约(无 5xx)
        run: |
          docker compose -f docker-compose.test.yml run --rm test \
            pytest -m fuzz tests/test_openapi_fuzz.py -p no:cacheprovider -q
