services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    command: python -m api.main
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/app/shared
      - ./api:/app/api
      - ./configs:/app/configs
      - ${MNEMO_DATA_DIR:-./data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - API_TOKEN=${API_TOKEN:-}
      - API_ALLOW_NO_AUTH=${API_ALLOW_NO_AUTH:-1}   # 本机开发默认放行(空 token 时);公网暴露设 0
      # app_credentials at-rest 加密的 Fernet key。空=明文落库；设 key 即加密。
      - MNEMO_SECRET_KEY=${MNEMO_SECRET_KEY:-}
      - API_RELOAD=1   # 开发热更新(生产默认关,避免 StatReload 常驻)
    depends_on:
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    command: python -m scheduler.main
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared
      - ./scheduler:/app/scheduler
      - ./configs:/app/configs
      - ${MNEMO_DATA_DIR:-./data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
    depends_on:
      - redis

  worker-cpu:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    command: python -m worker.main --type cpu
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker
      - ./steps:/app/steps
      - ./configs:/app/configs
      - ${MNEMO_DATA_DIR:-./data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
    depends_on:
      - redis

  worker-ai:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    command: python -m worker.main --type ai
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker
      - ./steps:/app/steps
      - ./configs:/app/configs
      - ${MNEMO_DATA_DIR:-./data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DRY_RUN=${DRY_RUN:-0}
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      target: build
    command: npx vite --host 0.0.0.0
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
    depends_on:
      - api

  # 日志面板。默认仅绑本机；局域网访问设 DOZZLE_BIND_IP=<局域网IP>。
  # 可选接入远程 dozzle agent（host:port，如经 SSH 隧道转发）设 DOZZLE_REMOTE_AGENT。
  dozzle:
    image: amir20/dozzle
    restart: unless-stopped
    environment:
      - DOZZLE_REMOTE_AGENT=${DOZZLE_REMOTE_AGENT:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_BIND_IP:-127.0.0.1}:${DOZZLE_PORT:-8888}:8080"

volumes:
  redis-data:
