services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    command: python -m api.main
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/app/shared
      - ./api:/app/api
      - ./configs:/app/configs
      - ${MNEMO_DATA_DIR:-./data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - API_TOKEN=${API_TOKEN:-}
    depends_on:
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    command: python -m scheduler.main
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared
      - ./scheduler:/app/scheduler
      - ./configs:/app/configs
      - ${MNEMO_DATA_DIR:-./data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
    depends_on:
      - redis

  worker-cpu:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    command: python -m worker.main --type cpu
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker
      - ./steps:/app/steps
      - ./configs:/app/configs
      - ${MNEMO_DATA_DIR:-./data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
    depends_on:
      - redis

  worker-ai:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    command: python -m worker.main --type ai
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker
      - ./steps:/app/steps
      - ./configs:/app/configs
      - ${MNEMO_DATA_DIR:-./data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DRY_RUN=${DRY_RUN:-0}
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      target: build
    command: npx vite --host 0.0.0.0
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
    depends_on:
      - api

  # 日志面板：只绑局域网，不开公网。访问 http://127.0.0.1:8888
  # DOZZLE_REMOTE_AGENT 经 NAS->ECS 的 -L 隧道(${DOZZLE_REMOTE_AGENT:-})
  # 接入 ECS 上的 dozzle agent，于同一面板查看 ECS 容器日志。
  dozzle:
    image: amir20/dozzle
    restart: unless-stopped
    environment:
      - DOZZLE_REMOTE_AGENT=${DOZZLE_REMOTE_AGENT:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_BIND_IP:-127.0.0.1}:${DOZZLE_PORT:-8888}:8080"

volumes:
  redis-data:
