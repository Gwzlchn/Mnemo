# Flori 生产部署：运行 ghcr 上由 CI 构建的镜像，Watchtower 跟随 CI 自动更新（CD）。
name: flori
# 主机相关项（数据目录、Dozzle 绑定地址、远程 agent 等）放 .env，见 .env.example。
# 默认仅起后端；单机全栈再带前端：`docker compose --profile allinone up -d`。
# 拆分部署时前端单独在公网入口机运行（边缘反代由各自部署维护）。
# 容器统一命名 flori-*（单实例部署；要并行多实例请另起具名服务，见 .local 覆盖里的 worker 范式）。
# 日志轮转:json-file 默认无上限,长跑会撑爆宿主磁盘。统一锚点限单文件 10m × 3 份。
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# api/scheduler/worker 共用的基础 env(REDIS/DATA/CONFIG/MINIO),各 service 经 <<: *common-env
# 合并 + 追加自身专属项,避免逐 service 复制(H-4)。
x-common-env: &common-env
  REDIS_URL: redis://redis:6379/0
  DATA_DIR: /data
  CONFIG_DIR: /app/configs
  MINIO_URL: ${MINIO_URL:-}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
  MINIO_BUCKET: ${MINIO_BUCKET:-flori}

services:
  redis:
    container_name: flori-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    logging: *default-logging
    volumes:
      - redis-data:/data

  # MCP server(把知识库作为 MCP 给 agent;stdio v1,只读行为)。非常驻——由 agent 启动:
  #   claude mcp add flori -- docker compose -f docker-compose.yml --profile mcp run --rm -T mcp
  # profile 隔离不随 up 起;-T 关 TTY 保 stdio 干净。挂 rw(SQLite WAL 需可写 -wal/-shm),只读由代码保证(无写工具)。
  mcp:
    container_name: flori-mcp
    image: ghcr.io/${IMAGE_OWNER:-gwzlchn}/flori:${IMAGE_TAG:-latest}
    profiles: ["mcp"]
    command: python -m api.mcp_server
    volumes:
      - ${FLORI_DATA_DIR:-flori-data}:/data
    environment:
      <<: *common-env
    logging: *default-logging

  api:
    container_name: flori-api
    image: ghcr.io/${IMAGE_OWNER:-gwzlchn}/flori:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: python -m api.main
    ports:
      # 默认仅绑本机(经 Caddy/Tunnel 暴露);裸 up 不直接暴露到局域网。
      # 需局域网直连设 API_BIND_IP=<局域网IP> 并务必设 API_TOKEN。
      - "${API_BIND_IP:-127.0.0.1}:${API_PORT:-8000}:8000"
    volumes:
      - ${FLORI_DATA_DIR:-flori-data}:/data
      # local_dir 订阅来源约定监听目录:把文件放进 ${FLORI_INBOX_DIR}(默认宿主 ./inbox)
      # 即被 source_type=local_dir、source_id=/data/inbox 的订阅枚举入库。
      # api 跑 enumerate_source→scan_dir(枚举,只读即可);与 worker-cpu 挂同一容器内路径。
      - ${FLORI_INBOX_DIR:-./inbox}:/data/inbox:ro
    environment:
      <<: *common-env
      WORK_DIR: ${WORK_DIR:-/tmp/flori-work}
      API_TOKEN: ${API_TOKEN:-}
      # 可信内网默认放行(空 API_TOKEN);公网/局域网直连暴露务必设 API_TOKEN 并把此项置 0。
      # 未设 API_TOKEN 且此项非 1 时后端 fail-closed(503),不再静默裸奔(见 docs/07-security)。
      API_ALLOW_NO_AUTH: ${API_ALLOW_NO_AUTH:-1}
      # app_credentials(B站 SESSDATA 等) at-rest 加密的 Fernet key。
      # 空=凭证以明文落库；设一把 Fernet key 即加密(见 docs/07-security §密钥管理)。
      FLORI_SECRET_KEY: ${FLORI_SECRET_KEY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
    logging: *default-logging
    healthcheck:
      # /openapi.json 始终免鉴权,能取到即进程在正常服务 HTTP(编排/watchtower 据此判活)。
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/openapi.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - redis

  scheduler:
    container_name: flori-scheduler
    image: ghcr.io/${IMAGE_OWNER:-gwzlchn}/flori:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: python -m scheduler.main
    logging: *default-logging
    volumes:
      - ${FLORI_DATA_DIR:-flori-data}:/data
    environment:
      <<: *common-env
      WORK_DIR: ${WORK_DIR:-/tmp/flori-work}
      # 下载完但所在池暂无可用 worker(如 cpu worker 被暂停)的 job 等多久才 fail-fast。
      # 默认 12h:够覆盖"夜间只跑 io worker / 白天暂停某类 worker"的运维窗口;超时才判失败。
      NO_WORKER_GRACE_SEC: ${NO_WORKER_GRACE_SEC:-43200}
      # 与 api 共用镜像/DB,故同样传入(凭证由 api 端读写,scheduler 一般用不到,无害)。
      # 空=凭证以明文落库；设一把 Fernet key 即加密(见 docs/07-security §密钥管理)。
      FLORI_SECRET_KEY: ${FLORI_SECRET_KEY:-}
      # 设了就把卡死等关键事件 POST 到 webhook(Slack/Discord/通用);空=只记日志。
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - redis

  worker-cpu:
    container_name: flori-worker-cpu
    image: ghcr.io/${IMAGE_OWNER:-gwzlchn}/flori:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: python -m worker.main --type cpu
    logging: *default-logging
    # 默认 subprocess 执行器,不挂 docker.sock(避免宿主 root 等价暴露);
    # 切 docker 执行器请叠加 docker-compose.executor.yml。
    volumes:
      - ${FLORI_DATA_DIR:-flori-data}:/data
      - ${HOST_WORK_DIR:-flori-work}:/tmp/flori-work
      # local_dir 订阅:worker 跑 step_01_download._copy_local_file 复制源文件,
      # 须与 api 挂同一容器内路径 /data/inbox(file:// url 在 worker 容器内按此解析)。只读即可。
      - ${FLORI_INBOX_DIR:-./inbox}:/data/inbox:ro
    environment:
      <<: *common-env
      STEP_RUNTIME: ${STEP_RUNTIME:-subprocess}
      WORK_DIR: /tmp/flori-work
      # 稳定身份:WORKER_NAME 派生确定性 id({type}-sha256(name)[:8]),id 文件存 /data/workers/<name>。
      # 同机多 worker 各给唯一 WORKER_NAME 即不撞;重装/重注册 id 不变(详见 worker/worker.py)。
      WORKER_NAME: cpu
      HOST_WORK_DIR: ${HOST_WORK_DIR:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - redis

  worker-ai:
    container_name: flori-worker-ai
    image: ghcr.io/${IMAGE_OWNER:-gwzlchn}/flori:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: python -m worker.main --type ai
    logging: *default-logging
    # 默认 subprocess 执行器,不挂 docker.sock(避免宿主 root 等价暴露);
    # 切 docker 执行器请叠加 docker-compose.executor.yml。
    volumes:
      - ${FLORI_DATA_DIR:-flori-data}:/data
      - ${HOST_WORK_DIR:-flori-work}:/tmp/flori-work
    environment:
      <<: *common-env
      STEP_RUNTIME: ${STEP_RUNTIME:-subprocess}
      WORK_DIR: /tmp/flori-work
      WORKER_NAME: ai
      HOST_WORK_DIR: ${HOST_WORK_DIR:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      DRY_RUN: ${DRY_RUN:-0}
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - redis

  # 日志面板（可选）。默认仅绑本机；局域网访问设 DOZZLE_BIND_IP=<局域网IP>。
  # 接入远程 dozzle agent（host:port，如经 SSH 隧道）设 DOZZLE_REMOTE_AGENT。
  dozzle:
    container_name: flori-dozzle
    image: amir20/dozzle
    restart: unless-stopped
    environment:
      - DOZZLE_REMOTE_AGENT=${DOZZLE_REMOTE_AGENT:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_BIND_IP:-127.0.0.1}:${DOZZLE_PORT:-8888}:8080"

  # 单机全栈时启用：`docker compose --profile allinone up -d`。
  frontend:
    container_name: flori-frontend
    image: ghcr.io/${IMAGE_OWNER:-gwzlchn}/flori-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    profiles: ["allinone"]
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - api

  # 对象存储:分布式 worker 模式下的共享产物存储(单机本地存储用不到,故 profile 隔离)。
  # 启用:docker compose --profile distributed up -d,并在 .env 设 MINIO_URL=minio:9000 + 账号。
  # 数据落 MINIO_DATA_DIR(默认命名卷;放独立磁盘填绝对路径让对象存本机)。
  minio:
    container_name: flori-minio
    image: minio/minio
    restart: unless-stopped
    profiles: ["distributed"]
    command: server /data --console-address ":9001"
    environment:
      # 无弱默认:启用 distributed profile 必须在 .env 设 MINIO_SECRET_KEY(>=8 位),
      # 否则 MinIO 因空密码拒绝启动(fail-fast),不会以可猜的默认口令裸跑。
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-flori}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-}
    volumes:
      - ${MINIO_DATA_DIR:-minio-data}:/data

  # CD：每 120s 查 ghcr，只更新带 watchtower.enable 标签的容器，自动 pull+重建+清理旧镜像。
  watchtower:
    container_name: flori-watchtower
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --interval 120

volumes:
  redis-data:
  flori-data:
  minio-data:
  # docker 执行器的步容器共享工作区;HOST_WORK_DIR 留空时退化为命名卷。
  flori-work:
