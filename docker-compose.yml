# Mnemo 生产部署：运行 ghcr 上由 CI 构建的镜像，Watchtower 跟随 CI 自动更新（CD）。
# 主机相关项（数据目录、Dozzle 绑定地址、远程 agent 等）放 .env，见 .env.example。
# 默认仅起后端；单机全栈再带前端：`docker compose --profile allinone up -d`。
# 拆分部署时前端单独在公网入口机运行（边缘反代由各自部署维护）。
# 容器统一命名 mnemo-*（单实例部署；要并行多实例请另起具名服务，见 .local 覆盖里的 worker 范式）。
# 日志轮转:json-file 默认无上限,长跑会撑爆宿主磁盘。统一锚点限单文件 10m × 3 份。
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    container_name: mnemo-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    logging: *default-logging
    volumes:
      - redis-data:/data

  api:
    container_name: mnemo-api
    image: ghcr.io/${IMAGE_OWNER:-gwzlchn}/mnemo:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: python -m api.main
    ports:
      # 默认仅绑本机(经 Caddy/Tunnel 暴露);裸 up 不直接暴露到局域网。
      # 需局域网直连设 API_BIND_IP=<局域网IP> 并务必设 API_TOKEN。
      - "${API_BIND_IP:-127.0.0.1}:${API_PORT:-8000}:8000"
    volumes:
      - ${MNEMO_DATA_DIR:-mnemo-data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - MINIO_URL=${MINIO_URL:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-mnemo}
      - WORK_DIR=${WORK_DIR:-/tmp/mnemo-work}
      - API_TOKEN=${API_TOKEN:-}
      # 可信内网默认放行(空 API_TOKEN);公网/局域网直连暴露务必设 API_TOKEN 并把此项置 0。
      # 未设 API_TOKEN 且此项非 1 时后端 fail-closed(503),不再静默裸奔(见 docs/07-security)。
      - API_ALLOW_NO_AUTH=${API_ALLOW_NO_AUTH:-1}
      # app_credentials(B站 SESSDATA 等) at-rest 加密的 Fernet key。
      # 空=凭证以明文落库；设一把 Fernet key 即加密(见 docs/07-security §密钥管理)。
      - MNEMO_SECRET_KEY=${MNEMO_SECRET_KEY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    logging: *default-logging
    healthcheck:
      # /openapi.json 始终免鉴权,能取到即进程在正常服务 HTTP(编排/watchtower 据此判活)。
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/openapi.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - redis

  scheduler:
    container_name: mnemo-scheduler
    image: ghcr.io/${IMAGE_OWNER:-gwzlchn}/mnemo:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: python -m scheduler.main
    logging: *default-logging
    volumes:
      - ${MNEMO_DATA_DIR:-mnemo-data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - MINIO_URL=${MINIO_URL:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-mnemo}
      - WORK_DIR=${WORK_DIR:-/tmp/mnemo-work}
      # 与 api 共用镜像/DB,故同样传入(凭证由 api 端读写,scheduler 一般用不到,无害)。
      # 空=凭证以明文落库；设一把 Fernet key 即加密(见 docs/07-security §密钥管理)。
      - MNEMO_SECRET_KEY=${MNEMO_SECRET_KEY:-}
      # 设了就把卡死等关键事件 POST 到 webhook(Slack/Discord/通用);空=只记日志。
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - redis

  worker-cpu:
    container_name: mnemo-worker-cpu
    image: ghcr.io/${IMAGE_OWNER:-gwzlchn}/mnemo:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: python -m worker.main --type cpu
    logging: *default-logging
    # 默认 subprocess 执行器,不挂 docker.sock(避免宿主 root 等价暴露);
    # 切 docker 执行器请叠加 docker-compose.executor.yml。
    volumes:
      - ${MNEMO_DATA_DIR:-mnemo-data}:/data
      - ${HOST_WORK_DIR:-mnemo-work}:/tmp/mnemo-work
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - MINIO_URL=${MINIO_URL:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-mnemo}
      - STEP_RUNTIME=${STEP_RUNTIME:-subprocess}
      - WORK_DIR=/tmp/mnemo-work
      - HOST_WORK_DIR=${HOST_WORK_DIR:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - redis

  worker-ai:
    container_name: mnemo-worker-ai
    image: ghcr.io/${IMAGE_OWNER:-gwzlchn}/mnemo:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: python -m worker.main --type ai
    logging: *default-logging
    # 默认 subprocess 执行器,不挂 docker.sock(避免宿主 root 等价暴露);
    # 切 docker 执行器请叠加 docker-compose.executor.yml。
    volumes:
      - ${MNEMO_DATA_DIR:-mnemo-data}:/data
      - ${HOST_WORK_DIR:-mnemo-work}:/tmp/mnemo-work
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - MINIO_URL=${MINIO_URL:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-mnemo}
      - STEP_RUNTIME=${STEP_RUNTIME:-subprocess}
      - WORK_DIR=/tmp/mnemo-work
      - HOST_WORK_DIR=${HOST_WORK_DIR:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - DRY_RUN=${DRY_RUN:-0}
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - redis

  # 日志面板（可选）。默认仅绑本机；局域网访问设 DOZZLE_BIND_IP=<局域网IP>。
  # 接入远程 dozzle agent（host:port，如经 SSH 隧道）设 DOZZLE_REMOTE_AGENT。
  dozzle:
    container_name: mnemo-dozzle
    image: amir20/dozzle
    restart: unless-stopped
    environment:
      - DOZZLE_REMOTE_AGENT=${DOZZLE_REMOTE_AGENT:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_BIND_IP:-127.0.0.1}:${DOZZLE_PORT:-8888}:8080"

  # 单机全栈时启用：`docker compose --profile allinone up -d`。
  frontend:
    container_name: mnemo-frontend
    image: ghcr.io/${IMAGE_OWNER:-gwzlchn}/mnemo-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    profiles: ["allinone"]
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - api

  # 对象存储:分布式 worker 模式下的共享产物存储(单机本地存储用不到,故 profile 隔离)。
  # 启用:docker compose --profile distributed up -d,并在 .env 设 MINIO_URL=minio:9000 + 账号。
  # 数据落 MINIO_DATA_DIR(默认命名卷;放独立磁盘填绝对路径让对象存本机)。
  minio:
    container_name: mnemo-minio
    image: minio/minio
    restart: unless-stopped
    profiles: ["distributed"]
    command: server /data --console-address ":9001"
    environment:
      # 无弱默认:启用 distributed profile 必须在 .env 设 MINIO_SECRET_KEY(>=8 位),
      # 否则 MinIO 因空密码拒绝启动(fail-fast),不会以可猜的默认口令裸跑。
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-mnemo}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-}
    volumes:
      - ${MINIO_DATA_DIR:-minio-data}:/data

  # CD：每 120s 查 ghcr，只更新带 watchtower.enable 标签的容器，自动 pull+重建+清理旧镜像。
  watchtower:
    container_name: mnemo-watchtower
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --interval 120

volumes:
  redis-data:
  mnemo-data:
  minio-data:
  # docker 执行器的步容器共享工作区;HOST_WORK_DIR 留空时退化为命名卷。
  mnemo-work:
