# Mnemo 生产部署：运行 ghcr 上由 CI 构建的镜像，Watchtower 跟随 CI 自动更新（CD）。
# 主机相关项（数据目录、Dozzle 绑定地址、远程 agent 等）放 .env，见 .env.example。
# 默认仅起后端；单机全栈再带前端：`docker compose --profile allinone up -d`。
# 拆分部署时前端单独在公网入口机运行（边缘反代由各自部署维护）。
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  api:
    image: ghcr.io/gwzlchn/mnemo:latest
    restart: unless-stopped
    command: python -m api.main
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ${MNEMO_DATA_DIR:-mnemo-data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - MINIO_URL=${MINIO_URL:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-mnemo}
      - WORK_DIR=${WORK_DIR:-/tmp/mnemo-work}
      - API_TOKEN=${API_TOKEN:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - redis

  scheduler:
    image: ghcr.io/gwzlchn/mnemo:latest
    restart: unless-stopped
    command: python -m scheduler.main
    volumes:
      - ${MNEMO_DATA_DIR:-mnemo-data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - MINIO_URL=${MINIO_URL:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-mnemo}
      - WORK_DIR=${WORK_DIR:-/tmp/mnemo-work}
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - redis

  worker-cpu:
    image: ghcr.io/gwzlchn/mnemo:latest
    restart: unless-stopped
    command: python -m worker.main --type cpu
    # 默认 subprocess 执行器,不挂 docker.sock(避免宿主 root 等价暴露);
    # 切 docker 执行器请叠加 docker-compose.executor.yml。
    volumes:
      - ${MNEMO_DATA_DIR:-mnemo-data}:/data
      - ${HOST_WORK_DIR:-mnemo-work}:/tmp/mnemo-work
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - MINIO_URL=${MINIO_URL:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-mnemo}
      - STEP_RUNTIME=${STEP_RUNTIME:-subprocess}
      - WORK_DIR=/tmp/mnemo-work
      - HOST_WORK_DIR=${HOST_WORK_DIR:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - redis

  worker-ai:
    image: ghcr.io/gwzlchn/mnemo:latest
    restart: unless-stopped
    command: python -m worker.main --type ai
    # 默认 subprocess 执行器,不挂 docker.sock(避免宿主 root 等价暴露);
    # 切 docker 执行器请叠加 docker-compose.executor.yml。
    volumes:
      - ${MNEMO_DATA_DIR:-mnemo-data}:/data
      - ${HOST_WORK_DIR:-mnemo-work}:/tmp/mnemo-work
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - MINIO_URL=${MINIO_URL:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-mnemo}
      - STEP_RUNTIME=${STEP_RUNTIME:-subprocess}
      - WORK_DIR=/tmp/mnemo-work
      - HOST_WORK_DIR=${HOST_WORK_DIR:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - DRY_RUN=${DRY_RUN:-0}
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - redis

  # 日志面板（可选）。默认仅绑本机；局域网访问设 DOZZLE_BIND_IP=<局域网IP>。
  # 接入远程 dozzle agent（host:port，如经 SSH 隧道）设 DOZZLE_REMOTE_AGENT。
  dozzle:
    image: amir20/dozzle
    restart: unless-stopped
    environment:
      - DOZZLE_REMOTE_AGENT=${DOZZLE_REMOTE_AGENT:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_BIND_IP:-127.0.0.1}:${DOZZLE_PORT:-8888}:8080"

  # 单机全栈时启用：`docker compose --profile allinone up -d`。
  frontend:
    image: ghcr.io/gwzlchn/mnemo-frontend:latest
    restart: unless-stopped
    profiles: ["allinone"]
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - api

  # 对象存储:分布式 worker 模式下的共享产物存储(单机本地存储用不到,故 profile 隔离)。
  # 启用:docker compose --profile distributed up -d,并在 .env 设 MINIO_URL=minio:9000 + 账号。
  # 数据落 MINIO_DATA_DIR(默认命名卷;放独立磁盘填绝对路径让对象存本机)。
  minio:
    image: minio/minio
    restart: unless-stopped
    profiles: ["distributed"]
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-mnemo}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-mnemochangeme}
    volumes:
      - ${MINIO_DATA_DIR:-minio-data}:/data

  # CD：每 120s 查 ghcr，只更新带 watchtower.enable 标签的容器，自动 pull+重建+清理旧镜像。
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --interval 120

volumes:
  redis-data:
  mnemo-data:
  minio-data:
  # docker 执行器的步容器共享工作区;HOST_WORK_DIR 留空时退化为命名卷。
  mnemo-work:
